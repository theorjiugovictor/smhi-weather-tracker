name: Deploy SMHI Weather Tracker (GCP)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: europe-north1
  SERVICE_NAME: smhi-weather-tracker-api
  ARTIFACT_REPO: smhi-weather-tracker-api
  FRONTEND_BUCKET: ${{ secrets.GCS_BUCKET_NAME }}

jobs:
  # ─────────────────────────────────────────────────
  # Stage 1: Lint & Test
  # ─────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || echo "No tests directory, skipping"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────────────
  # Stage 2: Terraform (Infrastructure)
  # ─────────────────────────────────────────────────
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    outputs:
      cloud_run_url: ${{ steps.outputs.outputs.cloud_run_url }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: outputs
        working-directory: terraform
        run: |
          echo "cloud_run_url=$(terraform output -raw cloud_run_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_url | sed 's|https://storage.googleapis.com/||;s|/index.html||')" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────
  # Stage 3: Build & Push to Artifact Registry
  # ─────────────────────────────────────────────────
  build:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: [test, terraform]
    if: github.event_name == 'workflow_dispatch'
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/api:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/api:latest"

          cd backend
          docker build -t $IMAGE -t $IMAGE_LATEST .
          docker push $IMAGE
          docker push $IMAGE_LATEST

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────
  # Stage 4: Deploy Backend to Cloud Run
  # ─────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Cloud Run)
    runs-on: ubuntu-latest
    needs: [build, terraform]

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.build.outputs.image }}
          flags: |
            --port=8000
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=3
            --allow-unauthenticated
            --set-env-vars=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "✅ Backend deployed: $URL"
          curl -sf "$URL/api/cache-status?year=2024" | jq .

  # ─────────────────────────────────────────────────
  # Stage 5: Deploy Frontend to Cloud Storage + CDN
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (GCS + Cloud CDN)
    runs-on: ubuntu-latest
    needs: [test, terraform]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build production bundle
        env:
          VITE_API_URL: ""
        run: |
          cd frontend
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to Cloud Storage
        run: |
          # Sync static assets with long cache TTL
          gsutil -m rsync -r -d \
            -x 'index.html' \
            frontend/dist/ gs://${{ env.FRONTEND_BUCKET }}/

          # Upload index.html with no-cache for instant updates
          gsutil -h "Cache-Control:public, max-age=0, must-revalidate" \
            cp frontend/dist/index.html gs://${{ env.FRONTEND_BUCKET }}/index.html

          # Set cache headers on assets
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://${{ env.FRONTEND_BUCKET }}/assets/**"

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache smhi-weather-tracker-url-map \
            --path="/*" --async
          echo "✅ Frontend deployed & CDN cache invalidated"

